# Rebuilds the site daily so future-dated posts publish on schedule
# (Hugo's buildFuture is off; a post dated today appears after the next build).
# Requires the CF_PAGES_DEPLOY_HOOK repo secret: a Pages deploy hook URL from
# Cloudflare dashboard -> Pages project -> Settings -> Builds & deployments.
name: Scheduled rebuild

on:
  schedule:
    - cron: "10 5 * * *" # 00:10 EST / 01:10 EDT, just after midnight America/Detroit
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages deploy hook
        env:
          HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "CF_PAGES_DEPLOY_HOOK secret not set; skipping"
            exit 0
          fi
          curl -sf -X POST "$HOOK"
