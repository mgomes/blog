# Built with Hugo v0.164.0 (standard build suffices; extended not required).
baseURL = "https://mauriciogomes.com/"
title = "Success Not Guaranteed"
locale = "en-us"
timeZone = "America/Detroit"
buildFuture = false
capitalizeListTitles = false

[pagination]
pagerSize = 5

[taxonomies]
tag = "tags"

[permalinks.page]
posts = "/:contentbasename/"

[permalinks.term]
tags = "/tagged/:slug/"

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [["$$", "$$"]]
inline = []

[outputs]
home = ["html", "rss"]
section = ["html"]
taxonomy = ["html"]
term = ["html"]

[mediaTypes."application/rss+xml"]
suffixes = ["rss"]

[outputFormats.rss]
mediatype = "application/rss+xml"
baseName = "feed"

[services.rss]
limit = -1

[params]
author = "Mauricio Gomes"
description = "I'm Mauricio Gomes, a software engineer based out of Detroit. My goal in life is to learn everything while doing every side quest."
